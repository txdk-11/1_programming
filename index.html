<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>보안 Wordle (Security Wordle)</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>보안 Wordle</h1>

    <section class="controls">
      <label for="length">글자 길이:</label>
      <select id="length">
        <option value="4">4글자</option>
        <option value="5" selected>5글자</option>
        <option value="6">6글자</option>
      </select>

      <label for="attempts">시도 횟수:</label>
      <select id="attempts">
        <option value="6" selected>6회</option>
        <option value="7">7회</option>
        <option value="8">8회</option>
      </select>

      <button id="startBtn">새 게임</button>
      <button id="hintBtn">힌트 (한 글자)</button>
    </section>

    <section class="game">
      <div id="grid" class="grid" aria-label="게임 그리드"></div>
      <div id="keyboard" class="keyboard" aria-label="화면 키보드"></div>
    </section>

    <section class="info">
      <div id="message" class="message"></div>
      <div id="definition" class="definition" hidden>
        <h2 id="termTitle"></h2>
        <p id="termDesc"></p>
      </div>
    </section>

    <section class="instructions">
      <h3>게임 방법</h3>
      <ol>
        <li>단어의 글자와 위치가 모두 맞으면 초록(🟩)</li>
        <li>글자는 있으나 위치가 다르면 노랑(🟨)</li>
        <li>없으면 회색(⬜)</li>
        <li>정답을 맞히면 해당 용어의 설명을 보여줍니다.</li>
      </ol>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
